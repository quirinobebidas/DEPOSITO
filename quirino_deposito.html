<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quirino Bebidas — Depósito</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');
:root{
  --bg:#0a0a0f;--sur:#13131a;--sur2:#1c1c28;--bor:#2a2a3d;
  --acc:#e8c842;--txt:#f0f0f5;--mut:#7a7a9a;--grn:#27ae60;--blu:#2980b9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
#loading .logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:var(--acc)}
#loading .logo span{color:var(--txt)}
#loading .bar-wrap{width:300px;height:6px;background:var(--sur2);border-radius:999px;overflow:hidden}
#loading .bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));border-radius:999px;width:0%;transition:width .4s}
#loading .msg{color:var(--mut);font-size:.9rem;text-align:center;padding:0 20px}
#loading.hidden{display:none}

/* HEADER — mobile first */
header{
  background:var(--sur);border-bottom:2px solid var(--acc);
  padding:12px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--acc);line-height:1;flex-shrink:0}
.logo span{color:var(--txt)}

/* SEARCH — ocupa toda la fila en mobile */
.sw{
  flex:1;min-width:200px;position:relative;
  order:2;width:100%;
}
#si{
  width:100%;padding:11px 16px 11px 42px;
  background:var(--sur2);border:1.5px solid var(--bor);
  border-radius:999px;color:var(--txt);
  font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;
  transition:border-color .2s;-webkit-appearance:none;
}
#si:focus{border-color:var(--acc)}
#si::placeholder{color:var(--mut)}
.sico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:1rem;pointer-events:none}

/* FILTERS — scroll horizontal en mobile */
.filters{
  display:flex;gap:6px;flex-shrink:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;order:3;width:100%;padding-bottom:2px;
}
.filters::-webkit-scrollbar{display:none}
.fb{
  padding:7px 13px;border-radius:999px;border:1.5px solid var(--bor);
  background:transparent;color:var(--mut);
  font-family:'DM Sans',sans-serif;font-size:.8rem;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.fb.on{border-color:var(--acc);color:var(--acc);background:rgba(232,200,66,.08)}

/* SYNC + STATS en misma fila que logo en mobile */
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
#stats{color:var(--mut);font-size:.78rem;white-space:nowrap}
#stats strong{color:var(--acc)}
.sync-btn{
  background:transparent;border:1.5px solid var(--bor);border-radius:8px;
  color:var(--mut);padding:6px 10px;font-size:.78rem;cursor:pointer;
  transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;
}
.sync-btn:hover{border-color:var(--acc);color:var(--acc)}
.sync-btn.syncing{color:var(--acc);border-color:var(--acc);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;padding:16px;
}
@media(min-width:600px){
  #grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:20px 24px}
  .sw{order:unset;width:auto}
  .filters{order:unset;width:auto}
  header{flex-wrap:nowrap}
}
@media(min-width:1024px){
  #grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:24px 32px}
  header{padding:14px 32px}
  .logo{font-size:1.8rem}
  #si{font-size:1.05rem}
}

/* CARD */
.card{background:var(--sur);border:1.5px solid var(--bor);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);border-color:var(--acc);box-shadow:0 6px 20px rgba(232,200,66,.1)}
.card.hm{border-color:rgba(39,174,96,.3)}
.card.hm:hover{border-color:var(--grn)}
.ciw{width:100%;height:130px;background:var(--sur2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
@media(min-width:600px){.ciw{height:155px}}
.ciw img{width:100%;height:100%;object-fit:contain;padding:8px;opacity:0;transition:opacity .4s;position:absolute;inset:0}
.ciw img.ok{opacity:1}
.cph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--mut);font-size:.7rem;position:absolute;inset:0;transition:opacity .3s}
.cph .ic{font-size:2rem}
.cph.hid{opacity:0}
.tb{position:absolute;top:6px;right:6px;font-size:.58rem;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.tbc{background:rgba(232,200,66,.18);color:var(--acc)}
.tbu{background:rgba(41,128,185,.18);color:#5dade2}
.cbody{padding:10px;flex:1;display:flex;flex-direction:column;gap:5px}
.csku{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--mut);letter-spacing:1px}
.hm .csku{color:var(--grn)}
.ctit{font-size:.75rem;font-weight:500;line-height:1.3;flex:1}
.cmla{font-size:.65rem;color:var(--mut)}
.cnt{font-size:.66rem;background:var(--sur2);color:var(--mut);padding:2px 6px;border-radius:4px;display:inline-block}

#empty{display:none;padding:60px 20px;text-align:center;color:var(--mut)}
#empty.show{display:block}
#empty h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;margin-bottom:8px}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(8px)}
#modal.open{display:flex}
@media(min-width:600px){#modal{align-items:center;padding:20px}}
.mi{
  background:var(--sur);border:2px solid var(--acc);
  border-radius:18px 18px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  display:flex;flex-direction:column;animation:slideUp .25s ease;
}
@media(min-width:600px){
  .mi{border-radius:18px;max-width:860px;animation:pop .2s ease}
}
.mi.tu{border-color:#5dade2}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}

.mh{padding:18px 20px 14px;border-bottom:1px solid var(--bor);display:flex;flex-direction:column;gap:14px;background:linear-gradient(135deg,#13130e,var(--sur2))}
@media(min-width:500px){.mh{flex-direction:row;padding:20px 24px 16px}}
.mph{
  width:100%;height:180px;
  border-radius:10px;overflow:hidden;background:var(--sur2);
  display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;
}
@media(min-width:500px){.mph{width:170px;height:170px}}
.mph img{width:100%;height:100%;object-fit:contain;padding:8px;opacity:0;transition:opacity .4s}
.mph img.ok{opacity:1}
.pph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--mut);transition:opacity .3s}
.pph .bi{font-size:3rem}
.pph.hid{opacity:0}
.spin{position:absolute;width:26px;height:26px;border:3px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;display:none}
.spin.on{display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.mm{flex:1;min-width:0}
.mtb{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 9px;border-radius:4px;margin-bottom:7px}
.msb{display:inline-block;background:var(--acc);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;padding:3px 12px;border-radius:6px;margin-bottom:8px;margin-left:5px}
.mtit{font-size:1.1rem;font-weight:700;line-height:1.3;margin-bottom:8px}
.mlink{display:inline-flex;align-items:center;gap:5px;background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:5px 11px;color:var(--mut);text-decoration:none;font-size:.74rem;transition:all .2s}
.mlink:hover{border-color:var(--acc);color:var(--acc)}
.nomla{font-size:.72rem;color:var(--mut);border:1px dashed var(--bor);border-radius:6px;padding:4px 9px;display:inline-block;margin-top:4px}
.mb{padding:16px 20px}
@media(min-width:500px){.mb{padding:20px 24px}}
.sl{font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:3px;color:var(--acc);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.sl::after{content:'';flex:1;height:1px;background:var(--bor)}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:20px}
@media(min-width:500px){.ig{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
.ic{background:var(--sur2);border:1.5px solid var(--bor);border-radius:9px;padding:11px;display:flex;flex-direction:column;gap:5px}
.iq{width:34px;height:34px;background:var(--acc);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.25rem;display:flex;align-items:center;justify-content:center;border-radius:6px}
.iname{font-size:.75rem;font-weight:500;line-height:1.3}
.icod{font-size:.65rem;color:var(--mut)}
.pi{display:flex;justify-content:space-between;font-size:.76rem;color:var(--mut);margin-bottom:5px}
.pi strong{color:var(--txt)}
.pb{height:5px;background:var(--sur2);border-radius:999px;overflow:hidden;margin-bottom:14px}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));border-radius:999px;transition:width .3s}
.cr{display:flex;align-items:center;gap:12px;padding:11px 12px;background:var(--sur2);border:1.5px solid var(--bor);border-radius:9px;margin-bottom:7px;cursor:pointer;user-select:none;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.cr.dn{border-color:var(--grn);background:rgba(39,174,96,.07)}
.cb2{width:26px;height:26px;border:2px solid var(--bor);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .15s}
.dn .cb2{border-color:var(--grn);background:var(--grn);color:#fff}
.cq{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:var(--acc);min-width:30px;text-align:center}
.dn .cq{color:var(--grn)}
.cn{flex:1;font-size:.84rem;font-weight:500}
.dn .cn{text-decoration:line-through;color:var(--mut)}
.mf{padding:12px 20px;border-top:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;bottom:0;background:var(--sur)}
@media(min-width:500px){.mf{padding:12px 24px}}
.btn{padding:9px 18px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.btng{background:transparent;color:var(--mut);border:1.5px solid var(--bor)}
.btng:hover{border-color:var(--txt);color:var(--txt)}

#toast{position:fixed;bottom:80px;right:16px;background:var(--grn);color:#fff;padding:10px 18px;border-radius:9px;font-weight:600;font-size:.84rem;transform:translateY(60px);opacity:0;transition:all .3s;z-index:300;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast-err{position:fixed;bottom:80px;left:16px;right:16px;background:#c0392b;color:#fff;padding:10px 16px;border-radius:9px;font-size:.8rem;transform:translateY(60px);opacity:0;transition:all .3s;z-index:300;pointer-events:none;text-align:center}
#toast-err.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">QUIRINO<span>BEBIDAS</span></div>
  <div class="bar-wrap"><div class="bar" id="lbar"></div></div>
  <div class="msg" id="lmsg">Cargando datos…</div>
</div>

<header>
  <div class="logo">QUIRINO<span>BEBIDAS</span></div>
  <div class="header-right">
    <button class="sync-btn" id="syncBtn" onclick="syncDrive()">↻</button>
    <div id="stats">—</div>
  </div>
  <!-- Search ocupa su propia fila en mobile -->
  <div class="sw">
    <span class="sico">🔍</span>
    <input id="si" type="text" placeholder="Buscar por código o nombre…" autocomplete="off" inputmode="search">
  </div>
  <div class="filters">
    <button class="fb on" onclick="setF('todos',this)">Todos</button>
    <button class="fb" onclick="setF('combo',this)">Combos</button>
    <button class="fb" onclick="setF('unitario',this)">Unitarios</button>
    <button class="fb" onclick="setF('con-mla',this)">Con ML ✓</button>
  </div>
</header>

<div id="grid"></div>
<div id="empty"><h2>Sin resultados</h2><p>Probá con otro código o nombre</p></div>

<div id="modal">
  <div class="mi" id="mi">
    <div class="mh">
      <div class="mph">
        <div class="spin" id="sp"></div>
        <div class="pph" id="pph"><span class="bi">📦</span><span style="font-size:.7rem">Sin foto</span></div>
        <img id="mimg" alt=""
          onload="this.classList.add('ok');document.getElementById('pph').classList.add('hid');document.getElementById('sp').classList.remove('on');"
          onerror="this.style.display='none';document.getElementById('pph').classList.remove('hid');document.getElementById('sp').classList.remove('on');">
      </div>
      <div class="mm">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap">
          <span class="mtb" id="mtb"></span>
          <span class="msb" id="msk"></span>
        </div>
        <div class="mtit" id="mtit">—</div>
        <div id="mmla"></div>
      </div>
    </div>
    <div class="mb">
      <div class="sl" id="msl">COMPOSICIÓN</div>
      <div class="ig" id="mitems"></div>
      <div class="sl">CHECKLIST DE ARMADO</div>
      <div class="pi"><span id="pt">0 de 0</span><strong id="pp2">0%</strong></div>
      <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
      <div id="cl"></div>
    </div>
    <div class="mf">
      <span style="font-size:.74rem;color:var(--mut)">Tocá fuera para cerrar</span>
      <div style="display:flex;gap:8px">
        <button class="btn btng" onclick="resetCL()">↺ Reiniciar</button>
        <button class="btn btng" onclick="closeM()">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast">✓ ¡Paquete completo!</div>
<div id="toast-err"></div>

<script>
const CAMPANA_ID = '1nR93m_DyVpznH1AxctG-ZaCCn2k-wwkdOCuhqVAxWcI';
const COMPO_ID   = '1dGV18ywPPR730hK4ujtH7t3y7AvPW2pfZOp3ddpXBBs';

function csv(id, gid) {
  return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
}
const URLS = {
  activos : csv(CAMPANA_ID, '1030663518'),
  full    : csv(CAMPANA_ID, '987904254'),
  publi   : csv(CAMPANA_ID, '2074912510'),
  ean     : csv(CAMPANA_ID, '1366256856'),
  compo   : csv(COMPO_ID,   '1228121774'),
};

let DATA=[], cur=null, chk={}, filt='todos', q='', cache={};

function parseCSV(text) {
  const rows=[]; let inQ=false, row=[], cell='';
  for (let i=0;i<text.length;i++) {
    const c=text[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(c===','&&!inQ){row.push(cell.trim());cell='';continue;}
    if((c==='\n'||c==='\r')&&!inQ){
      if(c==='\r'&&text[i+1]==='\n')i++;
      row.push(cell.trim());rows.push(row);row=[];cell='';continue;
    }
    cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());rows.push(row);}
  return rows;
}

function toInt(v){try{return v?parseInt(parseFloat(String(v).replace(',','.'))):null;}catch{return null;}}
function mlaUrl(mla){return mla?`https://articulo.mercadolibre.com.ar/${mla.slice(0,3)}-${mla.slice(3)}`:''}
function setP(pct,msg){document.getElementById('lbar').style.width=pct+'%';document.getElementById('lmsg').textContent=msg;}

async function syncDrive() {
  const btn=document.getElementById('syncBtn');
  btn.classList.add('syncing'); btn.textContent='↻';
  document.getElementById('loading').classList.remove('hidden');
  setP(0,'Conectando con Google Drive…');
  try {
    setP(10,'Leyendo publicaciones de ML…');
    const mlaInfo={};
    for(const [key,url] of [['activos',URLS.activos],['full',URLS.full]]) {
      const res=await fetch(url);
      if(!res.ok) throw new Error('Drive error '+res.status);
      const rows=parseCSV(await res.text());
      const start=key==='activos'?3:5;
      for(let i=start;i<rows.length;i++){
        const r=rows[i], mla=(r[0]||'').trim(), title=(r[4]||'').trim();
        if(mla.startsWith('MLA')&&title&&title!=='None'&&!mlaInfo[mla])
          mlaInfo[mla]={title,url:mlaUrl(mla)};
      }
    }
    setP(30,`${Object.keys(mlaInfo).length} publicaciones ML…`);

    const skuMla={};
    for(const [key,url] of [['publi',URLS.publi],['ean',URLS.ean]]) {
      const res=await fetch(url);
      if(!res.ok) throw new Error('Drive error '+res.status);
      const rows=parseCSV(await res.text());
      const start=key==='publi'?2:1;
      for(let i=start;i<rows.length;i++){
        const r=rows[i];
        const skuCol=key==='publi'?2:0, mlaCol=key==='publi'?3:1;
        const sku=toInt(r[skuCol]); let mlaRaw=(r[mlaCol]||'').trim();
        if(!mlaRaw||!sku) continue;
        if(/^\d+$/.test(mlaRaw)) mlaRaw='MLA'+mlaRaw;
        if(mlaRaw.startsWith('MLA')&&!skuMla[sku]) skuMla[sku]=mlaRaw;
      }
    }
    setP(55,'Leyendo composiciones…');

    const comps={}, compNombre={}, codMat={};
    const res=await fetch(URLS.compo);
    if(!res.ok) throw new Error('Drive error '+res.status);
    const rows=parseCSV(await res.text());
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const sku=toInt(r[0]), cod=r[1]?String(toInt(r[1])):null;
      const nombre=(r[2]||'').trim(), qty=toInt(r[3])||1, nsku=(r[4]||'').trim();
      if(!sku||!cod||!nombre||nombre==='None') continue;
      if(!comps[sku]) comps[sku]=[];
      comps[sku].push({cod,nombre,cantidad:qty});
      if(nsku&&nsku!=='None'&&!compNombre[sku]) compNombre[sku]=nsku;
      if(!codMat[cod]) codMat[cod]=nombre;
    }
    setP(75,'Cruzando datos…');

    const records=[], seen=new Set();
    for(const [skuStr,items] of Object.entries(comps)){
      const sku=parseInt(skuStr), mla=skuMla[sku]||'';
      const info=mlaInfo[mla]||{}, title=info.title||compNombre[sku]||'';
      if(!title||title==='None') continue;
      records.push({sku,mla,title,url:mla?mlaUrl(mla):'',tipo:'combo',items});
      seen.add(sku);
    }
    for(const [cod,nombre] of Object.entries(codMat)){
      const codInt=parseInt(cod);
      if(seen.has(codInt)||!nombre||nombre==='None') continue;
      let mla=''; const nu=nombre.toUpperCase();
      for(const [m,info] of Object.entries(mlaInfo)){
        const tu=info.title.toUpperCase();
        if(nu===tu||nu.includes(tu)||tu.includes(nu)){mla=m;break;}
      }
      records.push({sku:codInt,mla,title:nombre,url:mla?mlaUrl(mla):'',tipo:'unitario',items:[{cod,nombre,cantidad:1}]});
    }
    records.sort((a,b)=>a.sku-b.sku);
    setP(95,`${records.length} productos listos…`);

    DATA=records; cache={};
    try{localStorage.setItem('quirino_data',JSON.stringify(DATA));localStorage.setItem('quirino_sync',new Date().toISOString());}catch(e){}
    setP(100,'¡Listo!');
    await new Promise(r=>setTimeout(r,500));
    document.getElementById('loading').classList.add('hidden');
    btn.classList.remove('syncing'); btn.textContent='↻';
    updateSyncLabel(); go();
  } catch(err) {
    console.error(err);
    document.getElementById('loading').classList.add('hidden');
    btn.classList.remove('syncing'); btn.textContent='↻';
    // Solo mostrar error si NO hay datos cargados (si hay datos, silencioso)
    if(!DATA.length) showErr('No se pudo conectar con Drive. Usando datos locales.');
    loadFallback(); go();

function loadFallback(){
  try{
    const s=localStorage.getItem('quirino_data');
    if(s){const p=JSON.parse(s);if(p&&p.length>0){DATA=p;return;}}
  }catch(e){}
  DATA=FALLBACK.slice();
}
function updateSyncLabel(){
  try{
    const t=localStorage.getItem('quirino_sync');
    if(t){const d=new Date(t);document.getElementById('syncBtn').title=`Última sync: ${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}
  }catch(e){}
}

function loadPhoto(mla,imgEl,phEl,spEl){
  if(!mla) return;
  if(cache[mla]){imgEl.src=cache[mla];return;}
  if(cache[mla]===null) return;
  if(spEl) spEl.classList.add('on');
  if(phEl) phEl.classList.add('hid');
  fetch(`https://api.mercadolibre.com/items/${mla}?attributes=thumbnail,pictures`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(spEl) spEl.classList.remove('on');
      let url=null;
      if(d){
        if(d.pictures&&d.pictures.length) url=(d.pictures[0].url||'').replace('http://','https://');
        if(!url&&d.thumbnail) url=d.thumbnail.replace('-I.jpg','-O.jpg').replace('http://','https://');
      }
      cache[mla]=url||null;
      if(url) imgEl.src=url; else if(phEl) phEl.classList.remove('hid');
    }).catch(()=>{cache[mla]=null;if(spEl)spEl.classList.remove('on');if(phEl)phEl.classList.remove('hid');});
}

function setF(f,btn){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');go();}
document.getElementById('si').addEventListener('input',function(){q=this.value.trim();go();});

function go(){
  const ql=q.toLowerCase(); let l=DATA;
  if(filt==='combo') l=l.filter(r=>r.tipo==='combo');
  if(filt==='unitario') l=l.filter(r=>r.tipo==='unitario');
  if(filt==='con-mla') l=l.filter(r=>r.mla);
  if(ql) l=l.filter(r=>String(r.sku).includes(ql)||r.title.toLowerCase().includes(ql)||(r.mla&&r.mla.toLowerCase().includes(ql))||r.items.some(i=>i.nombre.toLowerCase().includes(ql)||i.cod.includes(ql)));
  render(l);
}

function render(l){
  const grid=document.getElementById('grid'),empty=document.getElementById('empty'),stats=document.getElementById('stats');
  if(!l.length){grid.innerHTML='';empty.classList.add('show');stats.innerHTML='0';return;}
  empty.classList.remove('show');
  const show=l.slice(0,150);
  stats.innerHTML=`<strong>${l.length.toLocaleString('es')}</strong>`;
  grid.innerHTML=show.map(r=>{
    const hm=!!r.mla,iu=r.tipo==='unitario';
    return `<div class="card${hm?' hm':''}" onclick="openM(${r.sku})">
      <div class="ciw">
        <div class="cph" id="ph${r.sku}"><span class="ic">${iu?'🍾':'📦'}</span><span>${r.items.length} ítem${r.items.length!==1?'s':''}</span></div>
        <span class="tb ${iu?'tbu':'tbc'}">${iu?'UNIT':'COMBO'}</span>
        ${hm?`<img id="ci${r.sku}" alt="${r.title.replace(/"/g,"'")}" onload="this.classList.add('ok');document.getElementById('ph${r.sku}').classList.add('hid');" onerror="this.style.display='none'">`:``}
      </div>
      <div class="cbody">
        <div class="csku">COD ${r.sku}</div>
        <div class="ctit">${r.title}</div>
        ${hm?`<div class="cmla">${r.mla}</div>`:''}
        <div class="cnt">${iu?'Unitario':`${r.items.length} comp.`}</div>
      </div>
    </div>`;
  }).join('');
  show.filter(r=>r.mla).forEach(r=>{
    const img=document.getElementById('ci'+r.sku),ph=document.getElementById('ph'+r.sku);
    if(img) loadPhoto(r.mla,img,ph,null);
  });
}

function openM(sku){
  const r=DATA.find(d=>d.sku===sku);if(!r) return;
  cur=r;chk={};
  const iu=r.tipo==='unitario';
  const tb=document.getElementById('mtb');
  tb.textContent=iu?'UNITARIO':'COMBO / PACK';
  tb.style.cssText=iu?'background:rgba(41,128,185,.2);color:#5dade2':'background:rgba(232,200,66,.15);color:var(--acc)';
  document.getElementById('mi').className='mi'+(iu?' tu':'');
  document.getElementById('msk').textContent='COD '+r.sku;
  document.getElementById('mtit').textContent=r.title;
  document.getElementById('msl').textContent=iu?'PRODUCTO':'COMPOSICIÓN DEL PAQUETE';
  const img=document.getElementById('mimg'),pph=document.getElementById('pph'),sp=document.getElementById('sp');
  img.src='';img.classList.remove('ok');img.style.display='';pph.classList.remove('hid');sp.classList.remove('on');
  if(r.mla) loadPhoto(r.mla,img,pph,sp);
  const ml=document.getElementById('mmla');
  ml.innerHTML=r.mla&&r.url?`<a class="mlink" href="${r.url}" target="_blank">🛒 Ver en ML &nbsp;·&nbsp; ${r.mla}</a>`:'<span class="nomla">Sin publicación en ML</span>';
  document.getElementById('mitems').innerHTML=r.items.map(it=>`<div class="ic"><div class="iq">${it.cantidad}</div><div class="iname">${it.nombre}</div><div class="icod">Cód. ${it.cod}</div></div>`).join('');
  renderCL(r);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function renderCL(r){
  document.getElementById('cl').innerHTML=r.items.map((it,i)=>{
    const d=!!chk[i];
    return `<div class="cr${d?' dn':''}" onclick="tog(${i})"><div class="cb2">${d?'✓':''}</div><div class="cq">${it.cantidad}×</div><div class="cn">${it.nombre}</div></div>`;
  }).join('');
  updP(r);
}
function tog(i){chk[i]=!chk[i];if(cur)renderCL(cur);}
function updP(r){
  const t=r.items.length,d=Object.values(chk).filter(Boolean).length,p=t?Math.round(d/t*100):0;
  document.getElementById('pt').textContent=`${d} de ${t} completados`;
  document.getElementById('pp2').textContent=p+'%';
  document.getElementById('pf').style.width=p+'%';
  if(d===t&&t>0) showToast();
}
function resetCL(){chk={};if(cur)renderCL(cur);}
function closeM(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';cur=null;chk={};
  document.getElementById('sp').classList.remove('on');
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeM();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function showErr(msg){const t=document.getElementById('toast-err');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);}

async function init(){
  // Cargar datos locales SIEMPRE primero
  loadFallback();
  // Ocultar loading y mostrar grid pase lo que pase
  document.getElementById('loading').classList.add('hidden');
  go();
  updateSyncLabel();
  // Intentar sync con Drive en background (silencioso si falla)
  try{ await syncDrive(); }catch(e){ console.warn('Drive sync failed:', e); }
}
init();
</script>
</body>
