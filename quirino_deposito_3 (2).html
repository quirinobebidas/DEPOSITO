<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quirino Bebidas — Depósito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #e8c842;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --green: #27ae60;
    --blue: #2980b9;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 36px;
    display: flex; align-items: center; gap: 18px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.85rem; letter-spacing: 3px;
    color: var(--accent); flex-shrink: 0; line-height: 1;
  }
  .logo span { color: var(--text); }

  .search-wrap { flex: 1; position: relative; }
  #searchInput {
    width: 100%; padding: 12px 20px 12px 46px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 999px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none;
    transition: border-color .2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  .filters { display: flex; gap: 8px; flex-shrink: 0; }
  .filter-btn {
    padding: 7px 14px; border-radius: 999px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: .8rem;
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,200,66,.08); }
  .filter-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }

  .stats { color: var(--muted); font-size: .82rem; white-space: nowrap; flex-shrink: 0; }
  .stats strong { color: var(--accent); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px; padding: 26px 36px;
  }

  .card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r); overflow: hidden;
    cursor: pointer; transition: transform .15s, border-color .15s, box-shadow .15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 26px rgba(232,200,66,.11); }
  .card.has-mla { border-color: rgba(39,174,96,.25); }
  .card.has-mla:hover { border-color: var(--green); box-shadow: 0 8px 26px rgba(39,174,96,.12); }

  .card-img-wrap {
    width: 100%; height: 160px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: contain; padding: 10px;
    opacity: 0; transition: opacity .35s; position: absolute; inset: 0;
  }
  .card-img-wrap img.loaded { opacity: 1; }
  .card-placeholder {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 5px; color: var(--muted); font-size: .75rem;
    transition: opacity .3s; position: absolute; inset: 0;
  }
  .card-placeholder .icon { font-size: 2.5rem; }
  .card-placeholder.hidden { opacity: 0; }

  .tipo-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: .62rem; font-weight: 700; letter-spacing: .5px;
    padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
  }
  .badge-combo    { background: rgba(232,200,66,.2); color: var(--accent); }
  .badge-unitario { background: rgba(41,128,185,.2);  color: #5dade2; }

  .card-body { padding: 13px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-sku  { font-family: 'Bebas Neue', sans-serif; font-size: .92rem; color: var(--muted); letter-spacing: 1px; }
  .card.has-mla .card-sku { color: var(--green); }
  .card-title { font-size: .8rem; font-weight: 500; line-height: 1.33; flex: 1; }
  .card-mla   { font-size: .68rem; color: var(--muted); }
  .card-count {
    font-size: .7rem; background: var(--surface2);
    color: var(--muted); padding: 2px 7px; border-radius: 5px; display: inline-block;
  }

  #empty { display: none; padding: 80px 36px; text-align: center; color: var(--muted); }
  #empty.show { display: block; }
  #empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; margin-bottom: 8px; }

  #modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.88); z-index: 200;
    align-items: center; justify-content: center;
    padding: 22px; backdrop-filter: blur(8px);
  }
  #modal.open { display: flex; }
  .modal-inner {
    background: var(--surface); border: 2px solid var(--accent);
    border-radius: 18px; max-width: 840px; width: 100%;
    max-height: 92vh; overflow-y: auto;
    display: flex; flex-direction: column;
    animation: popIn .2s ease;
  }
  .modal-inner.tipo-unitario { border-color: #5dade2; }
  @keyframes popIn { from { opacity:0; transform:scale(.95) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 20px; align-items: flex-start;
    background: linear-gradient(135deg, #13130e, var(--surface2));
  }
  .modal-photo {
    width: 180px; height: 180px; flex-shrink: 0;
    border-radius: 11px; overflow: hidden;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .modal-photo img {
    width: 100%; height: 100%; object-fit: contain; padding: 8px;
    opacity: 0; transition: opacity .4s;
  }
  .modal-photo img.loaded { opacity: 1; }
  .photo-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 6px; color: var(--muted); transition: opacity .3s;
  }
  .photo-placeholder .big { font-size: 3.2rem; }
  .photo-placeholder.hidden { opacity: 0; }
  .spinner {
    position: absolute; width: 26px; height: 26px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite; display: none;
  }
  .spinner.on { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-meta { flex: 1; min-width: 0; }
  .modal-tipo-badge {
    display: inline-block; font-size: .68rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 10px; border-radius: 4px; margin-bottom: 8px;
  }
  .modal-sku-badge {
    display: inline-block; background: var(--accent); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
    letter-spacing: 2px; padding: 3px 13px; border-radius: 6px;
    margin-bottom: 9px; margin-left: 6px;
  }
  .modal-title { font-size: 1.2rem; font-weight: 700; line-height: 1.3; margin-bottom: 9px; }
  .modal-mla-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 12px; color: var(--muted);
    text-decoration: none; font-size: .76rem; transition: all .2s; cursor: pointer;
  }
  .modal-mla-link:hover { border-color: var(--accent); color: var(--accent); }
  .no-mla { font-size: .74rem; color: var(--muted); border: 1px dashed var(--border); border-radius: 6px; padding: 4px 10px; display: inline-block; margin-top: 5px; }

  .modal-body { padding: 20px 24px; }
  .section-label {
    font-family: 'Bebas Neue', sans-serif; font-size: .95rem;
    letter-spacing: 3px; color: var(--accent);
    margin-bottom: 13px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

  .items-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 9px; margin-bottom: 24px;
  }
  .item-card {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 9px; padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color .15s;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-qty {
    width: 36px; height: 36px; background: var(--accent); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem;
    display: flex; align-items: center; justify-content: center; border-radius: 6px;
  }
  .item-name { font-size: .78rem; font-weight: 500; line-height: 1.33; }
  .item-cod  { font-size: .67rem; color: var(--muted); }

  .progress-info { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: 6px; }
  .progress-info strong { color: var(--text); }
  .progress-bar { height: 5px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 999px; transition: width .3s ease; }

  .checklist-row {
    display: flex; align-items: center; gap: 13px;
    padding: 11px 13px; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 9px;
    margin-bottom: 8px; cursor: pointer; user-select: none;
    transition: border-color .15s, background .15s;
  }
  .checklist-row:hover { border-color: var(--accent); }
  .checklist-row.done { border-color: var(--green); background: rgba(39,174,96,.07); }
  .check-box {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-radius: 5px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: .88rem; transition: all .15s;
  }
  .done .check-box { border-color: var(--green); background: var(--green); color: #fff; }
  .check-qty { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); min-width: 32px; text-align: center; }
  .done .check-qty { color: var(--green); }
  .check-name { flex: 1; font-size: .86rem; font-weight: 500; }
  .done .check-name { text-decoration: line-through; color: var(--muted); }

  .modal-footer {
    padding: 13px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .btn {
    padding: 8px 20px; border: none; border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: .86rem;
    font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  #toast {
    position: fixed; bottom: 26px; right: 26px;
    background: var(--green); color: #fff;
    padding: 10px 20px; border-radius: 9px;
    font-weight: 600; font-size: .86rem;
    transform: translateY(60px); opacity: 0;
    transition: all .3s ease; z-index: 300; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (min-width: 1600px) {
    #searchInput { font-size: 1.2rem; }
    .card-title { font-size: .88rem; }
    .modal-title { font-size: 1.35rem; }
    .check-name { font-size: .96rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">QUIRINO<span>BEBIDAS</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text"
      placeholder="Buscar por código, nombre de producto…" autocomplete="off" autofocus>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('combo',this)">Combos</button>
    <button class="filter-btn" onclick="setFilter('unitario',this)">Unitarios</button>
    <button class="filter-btn" onclick="setFilter('con-mla',this)">Con ML</button>
  </div>
  <div class="stats" id="stats">Cargando…</div>
</header>

<div id="grid"></div>
<div id="empty">
  <h2>Sin resultados</h2>
  <p>Probá con otro código o nombre de producto</p>
</div>

<div id="modal">
  <div class="modal-inner" id="modalInner">
    <div class="modal-header">
      <div class="modal-photo" id="modalPhoto">
        <div class="spinner" id="photoSpinner"></div>
        <div class="photo-placeholder" id="photoPlaceholder">
          <span class="big">📦</span>
          <span style="font-size:.72rem">Sin foto</span>
        </div>
        <img id="modalImg" alt=""
          onload="this.classList.add('loaded'); document.getElementById('photoPlaceholder').classList.add('hidden'); document.getElementById('photoSpinner').classList.remove('on');"
          onerror="this.style.display='none'; document.getElementById('photoPlaceholder').classList.remove('hidden'); document.getElementById('photoSpinner').classList.remove('on');">
      </div>
      <div class="modal-meta">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
          <span class="modal-tipo-badge" id="modalTipoBadge"></span>
          <span class="modal-sku-badge" id="modalSku"></span>
        </div>
        <div class="modal-title" id="modalTitle">—</div>
        <div id="modalMla"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="section-label" id="modalSectionLabel">COMPOSICIÓN</div>
      <div class="items-grid" id="modalItems"></div>
      <div class="section-label">CHECKLIST DE ARMADO</div>
      <div class="progress-info">
        <span id="progressText">0 de 0 completados</span>
        <strong id="progressPct">0%</strong>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div id="checklist"></div>
    </div>
    <div class="modal-footer">
      <span style="font-size:.76rem;color:var(--muted)">ESC para cerrar</span>
      <div style="display:flex;gap:9px">
        <button class="btn btn-ghost" onclick="resetChecklist()">↺ Reiniciar</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast">✓ ¡Paquete completo!</div>

let currentRecord = null;
let currentChecks = {};
let currentFilter = 'todos';
let currentQuery  = '';
const photoCache  = {};

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = currentQuery.toLowerCase();
  let list = DATA;
  if (currentFilter === 'combo')    list = list.filter(r => r.tipo === 'combo');
  if (currentFilter === 'unitario') list = list.filter(r => r.tipo === 'unitario');
  if (currentFilter === 'con-mla')  list = list.filter(r => r.mla);
  if (q) list = list.filter(r =>
    String(r.sku).includes(q) ||
    r.title.toLowerCase().includes(q) ||
    (r.mla && r.mla.toLowerCase().includes(q)) ||
    r.items.some(i => i.nombre.toLowerCase().includes(q) || i.cod.includes(q))
  );
  renderGrid(list);
}

document.getElementById('searchInput').addEventListener('input', function() {
  currentQuery = this.value.trim();
  applyFilters();
});

function renderGrid(list) {
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');

  if (!list.length) {
    grid.innerHTML = '';
    empty.classList.add('show');
    stats.innerHTML = '0 resultados';
    return;
  }
  empty.classList.remove('show');
  const show  = list.slice(0, 150);
  const extra = list.length > 150 ? ` <span style="font-size:.75rem">(mostrando 150)</span>` : '';
  stats.innerHTML = `<strong>${list.length.toLocaleString('es')}</strong> productos${extra}`;

  grid.innerHTML = show.map(r => {
    const hasMla = !!r.mla;
    const isUnit = r.tipo === 'unitario';
    return `<div class="card${hasMla?' has-mla':''}" onclick="openModal(${r.sku})">
      <div class="card-img-wrap">
        <div class="card-placeholder" id="ph_${r.sku}">
          <span class="icon">${isUnit?'🍾':'📦'}</span>
          <span>${r.items.length} ítem${r.items.length!==1?'s':''}</span>
        </div>
        <span class="tipo-badge ${isUnit?'badge-unitario':'badge-combo'}">${isUnit?'UNITARIO':'COMBO'}</span>
        ${hasMla?`<img id="cimg_${r.sku}" alt="${r.title.replace(/"/g,"'")}"
          onload="this.classList.add('loaded');document.getElementById('ph_${r.sku}').classList.add('hidden');"
          onerror="this.style.display='none'">`:``}
      </div>
      <div class="card-body">
        <div class="card-sku">COD ${r.sku}</div>
        <div class="card-title">${r.title}</div>
        ${hasMla?`<div class="card-mla">${r.mla}</div>`:''}
        <div class="card-count">${isUnit?'Producto unitario':`${r.items.length} componente${r.items.length!==1?'s':''}`}</div>
      </div>
    </div>`;
  }).join('');

  show.filter(r => r.mla).forEach(loadCardPhoto);
}

function loadCardPhoto(r) {
  const img = document.getElementById('cimg_' + r.sku);
  if (!img) return;
  if (photoCache[r.mla] !== undefined) {
    if (photoCache[r.mla]) img.src = photoCache[r.mla];
    return;
  }
  fetch(`https://api.mercadolibre.com/items/${r.mla}?attributes=thumbnail,pictures`)
    .then(res => res.ok ? res.json() : null)
    .then(data => {
      let url = null;
      if (data) {
        if (data.pictures && data.pictures.length)
          url = (data.pictures[0].url || '').replace('http://', 'https://');
        if (!url && data.thumbnail)
          url = data.thumbnail.replace('-I.jpg', '-O.jpg').replace('http://', 'https://');
      }
      photoCache[r.mla] = url || null;
      if (url && img) img.src = url;
    })
    .catch(() => { photoCache[r.mla] = null; });
}

function openModal(sku) {
  const r = DATA.find(d => d.sku === sku);
  if (!r) return;
  currentRecord = r;
  currentChecks = {};

  const isUnit = r.tipo === 'unitario';

  const tipoBadge = document.getElementById('modalTipoBadge');
  tipoBadge.textContent = isUnit ? 'UNITARIO' : 'COMBO / PACK';
  tipoBadge.style.cssText = isUnit
    ? 'background:rgba(41,128,185,.2);color:#5dade2'
    : 'background:rgba(232,200,66,.15);color:var(--accent)';

  document.getElementById('modalInner').className = 'modal-inner' + (isUnit ? ' tipo-unitario' : '');
  document.getElementById('modalSku').textContent   = `COD ${r.sku}`;
  document.getElementById('modalTitle').textContent = r.title;
  document.getElementById('modalSectionLabel').textContent = isUnit ? 'PRODUCTO' : 'COMPOSICIÓN DEL PAQUETE';

  // Foto via API ML
  const img         = document.getElementById('modalImg');
  const placeholder = document.getElementById('photoPlaceholder');
  const spinner     = document.getElementById('photoSpinner');
  img.src = ''; img.classList.remove('loaded'); img.style.display = '';
  placeholder.classList.remove('hidden'); spinner.classList.remove('on');

  if (r.mla) {
    if (photoCache[r.mla]) {
      img.src = photoCache[r.mla];
    } else if (photoCache[r.mla] !== null) {
      spinner.classList.add('on');
      placeholder.classList.add('hidden');
      fetch(`https://api.mercadolibre.com/items/${r.mla}?attributes=thumbnail,pictures`)
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          spinner.classList.remove('on');
          let url = null;
          if (data) {
            if (data.pictures && data.pictures.length)
              url = (data.pictures[0].url || '').replace('http://', 'https://');
            if (!url && data.thumbnail)
              url = data.thumbnail.replace('-I.jpg', '-O.jpg').replace('http://', 'https://');
          }
          photoCache[r.mla] = url || null;
          if (url) img.src = url;
          else placeholder.classList.remove('hidden');
        })
        .catch(() => { spinner.classList.remove('on'); placeholder.classList.remove('hidden'); photoCache[r.mla] = null; });
    }
  }

  // Link ML — URL con guión correcto
  const mlaEl = document.getElementById('modalMla');
  if (r.mla && r.url) {
    mlaEl.innerHTML = `<a class="modal-mla-link" href="${r.url}" target="_blank">
      🛒 Ver en Mercado Libre &nbsp;·&nbsp; ${r.mla}
    </a>`;
  } else {
    mlaEl.innerHTML = '<span class="no-mla">Sin publicación activa en ML</span>';
  }

  document.getElementById('modalItems').innerHTML = r.items.map(item => `
    <div class="item-card">
      <div class="item-qty">${item.cantidad}</div>
      <div class="item-name">${item.nombre}</div>
      <div class="item-cod">Cód. ${item.cod}</div>
    </div>`).join('');

  renderChecklist(r);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderChecklist(r) {
  document.getElementById('checklist').innerHTML = r.items.map((item, i) => {
    const done = !!currentChecks[i];
    return `<div class="checklist-row${done?' done':''}" onclick="toggleCheck(${i})">
      <div class="check-box">${done?'✓':''}</div>
      <div class="check-qty">${item.cantidad}×</div>
      <div class="check-name">${item.nombre}</div>
    </div>`;
  }).join('');
  updateProgress(r);
}

function toggleCheck(i) {
  currentChecks[i] = !currentChecks[i];
  if (currentRecord) renderChecklist(currentRecord);
}

function updateProgress(r) {
  const total = r.items.length;
  const done  = Object.values(currentChecks).filter(Boolean).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressText').textContent = `${done} de ${total} completados`;
  document.getElementById('progressPct').textContent  = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  if (done === total && total > 0) showToast();
}

function resetChecklist() {
  currentChecks = {};
  if (currentRecord) renderChecklist(currentRecord);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  currentRecord = null; currentChecks = {};
  document.getElementById('photoSpinner').classList.remove('on');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

renderGrid(DATA);
</script>
</body>
</html>
